name: Payment CI/CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Tests (unit + integration + functional)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis/redis-stack-server:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            payment/requirements.txt
            payment/requirements-dev.txt

      - name: Install dependencies
        working-directory: payment
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: payment
        run: pytest -v

  build-and-push:
    name: Build and push Docker image
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./payment
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/payment:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/payment:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/payment:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
